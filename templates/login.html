


{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Log in — Dispatch</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body>

<header class="site">
  <div class="container">
    <a class="brand" href="/"><span class="mark"></span><div><strong>DISPATCH</strong><br><small>ADVANCED COMMERCE</small></div></a>
    <nav class="main"><a href="/">Catalog</a></nav>
    <div class="header-actions"></div>
  </div>
</header>

<main class="container">
  <div class="auth-shell">
    <span class="eyebrow">// Access manifest</span>
    <h1>Log in</h1>
    <p class="sub">Enter your credentials to view orders, saved carts, and checkout faster.</p>

    <div id="alertSlot"></div>

    <form id="loginForm" class="panel" novalidate>
      <div class="form-row">
        <label>Email</label>
        <input id="email" type="email" placeholder="you@example.com" required>
      </div>
      <div class="form-row">
        <label>Password</label>
        <input id="password" type="password" placeholder="••••••••" required>
      </div>
      <div class="form-error" id="formError"></div>
      <button class="btn amber block" type="submit" id="submitBtn">Log in</button>
    </form>

    <p class="auth-switch">New here? <a href="/register/">Create an account</a></p>
  </div>
</main>

<footer class="site"><div class="container"><span>© 2026 Dispatch Commerce Co.</span></div></footer>

<script src="{% static 'js/api.js' %}"></script>
<script>
if (Auth.isLoggedIn()) location.href = "/";

qs("#loginForm").addEventListener("submit", async (e) => {
  e.preventDefault();
  qs("#formError").textContent = "";
  const btn = qs("#submitBtn");
  btn.disabled = true; btn.textContent = "Logging in…";
  try {
    const res = await Api.login({ email: qs("#email").value, password: qs("#password").value });
    const token = res.token || res.accessToken || res.data?.token;
    const user = res.user || res.data?.user || res.data;
    if (!token) throw new Error("Login response didn't include a token — check the API contract in js/api.js");
    Auth.setToken(token);
    if (user) Auth.setUser(user);
    toast("Welcome back", "success");
    const redirectTo = new URLSearchParams(location.search).get("redirect") || "/";
    location.href = redirectTo;
  } catch (err) {
    qs("#formError").textContent = err.message;
    btn.disabled = false; btn.textContent = "Log in";
  }
});
</script>
</body>
</html>
