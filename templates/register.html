

{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Create account — Dispatch</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body>

<header class="site">
  <div class="container">
    <a class="brand" href="/"><span class="mark"></span><div><strong>DISPATCH</strong><br><small>ADVANCED COMMERCE</small></div></a>
    <nav class="main"><a href="/">Catalog</a></nav>
    <div class="header-actions"></div>
  </div>
</header>

<main class="container">
  <div class="auth-shell">
    <span class="eyebrow">// New manifest entry</span>
    <h1>Create your account</h1>
    <p class="sub">Track orders, save addresses, and check out in one step.</p>

    <div id="alertSlot"></div>

    <form id="registerForm" class="panel" novalidate>
      <div class="form-row">
        <label>Full name</label>
        <input id="name" placeholder="Jordan Rivera" required>
      </div>
      <div class="form-row">
        <label>Email</label>
        <input id="email" type="email" placeholder="you@example.com" required>
      </div>
      <div class="form-grid">
        <div class="form-row">
          <label>Password</label>
          <input id="password" type="password" placeholder="Min. 8 characters" required>
        </div>
        <div class="form-row">
          <label>Confirm password</label>
          <input id="confirmPassword" type="password" placeholder="Repeat password" required>
        </div>
      </div>
      <div class="form-error" id="formError"></div>
      <button class="btn amber block" type="submit" id="submitBtn">Create account</button>
    </form>

    <p class="auth-switch">Already have an account? <a href="/login/">Log in</a></p>
  </div>
</main>

<footer class="site"><div class="container"><span>© 2026 Dispatch Commerce Co.</span></div></footer>

<script src="{% static 'js/api.js' %}"></script>
<script>
if (Auth.isLoggedIn()) location.href = "/";

qs("#registerForm").addEventListener("submit", async (e) => {
  e.preventDefault();
  qs("#formError").textContent = "";

  const name = qs("#name").value.trim();
  const email = qs("#email").value.trim();
  const password = qs("#password").value;
  const confirmPassword = qs("#confirmPassword").value;

  if (password.length < 8){ qs("#formError").textContent = "Password must be at least 8 characters."; return; }
  if (password !== confirmPassword){ qs("#formError").textContent = "Passwords don't match."; return; }

  const btn = qs("#submitBtn");
  btn.disabled = true; btn.textContent = "Creating account…";
  try {
    const res = await Api.register({ name, email, password, passwordConfirm: confirmPassword });
    const token = res.token || res.accessToken || res.data?.token;
    const user = res.user || res.data?.user || res.data;
    if (token){
      Auth.setToken(token);
      if (user) Auth.setUser(user);
      toast("Account created", "success");
      location.href = "/";
    } else {
      toast("Account created — please log in", "success");
      location.href = "/login/";
    }
  } catch (err) {
    qs("#formError").textContent = err.message;
    btn.disabled = false; btn.textContent = "Create account";
  }
});
</script>
</body>
</html>
