


{% load static %}
<!DOCTYPE html>
<html>

<head>

    <title>E-Commerce OMS</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="{% static 'css/style.css' %}">
    <style>

        body{

            background:#f5f6fa;

        }

        .sidebar{

            height:100vh;

            background:#212529;

        }

        .sidebar a{

            color:white;

            display:block;

            padding:15px;

            text-decoration:none;

        }

        .sidebar a:hover{

            background:#0d6efd;

        }

        .card{

            border:none;

            border-radius:12px;

        }

    </style>

</head>

<body>

<div class="container-fluid">

<div class="row">

<div class="col-md-2 sidebar">

<h3 class="text-center text-white mt-3">

OMS

</h3>

<hr>

<a href="/dashboard/">

<i class="fa fa-chart-line"></i>

Dashboard

</a>

<a href="/products/">

<i class="fa fa-box"></i>

Products

</a>

<a href="/categories/">

<i class="fa fa-list"></i>

Categories

</a>

<a href="/orders/">

<i class="fa fa-shopping-cart"></i>

Orders

</a>

<a href="/customers/">

<i class="fa fa-users"></i>

Customers

</a>

<a href="/cart/">

<i class="fa fa-cart-shopping"></i>

Cart

</a>

<a href="/profile/">

<i class="fa fa-user"></i>

Profile

</a>

</div>

<div class="col-md-10">

<nav class="navbar navbar-light bg-white shadow-sm">

<div class="container-fluid">

<h4>E-Commerce Order Management System</h4>

</div>

</nav>

<div class="p-4">

{% block content %}

{% endblock %}

</div>

</div>

</div>

</div>

</body>

</html>
